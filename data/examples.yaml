examples:
  - id: kgmk
    dir: "Пример 1"
    label: "КГМК"
    keywords:
      - "кгмк"
      - "хвосты кгмк"
    hints:
      - "В экспертном мозговом штурме встречались магнитная сепарация целевого класса, доизмельчение, футеровка мельниц и классификация гидроциклонами."
      - "Excel-отчёт КГМК использовать как KPI-якорь: классы крупности и извлекаемый металл важнее общих рассуждений."

  - id: nof_vkr
    dir: "Пример 2"
    label: "НОФ Вкр"
    keywords:
      - "ноф вкр"
      - "вкрап"
      - "вкрапл"
      - "вкраплён"
      - "вкраплен"
    hints:
      - "Экспертные направления: геометрия футеровки мельниц, контроль гранулометрии после конусных дробилок, регулирование щели дробилок и подача воды."

  - id: nof_med
    dir: "Пример 3"
    label: "НОФ мед"
    keywords:
      - "ноф мед"
      - "ноф меди"
      - "медные хвосты ноф"
    hints:
      - "Экспертные направления: контроль гранулометрии питания мельниц, плотность пульпы на входе в основную флотацию, контактные чаны и дробление рудной гали."

  - id: tof
    dir: "Пример 4"
    label: "ТОФ"
    keywords:
      - "тоф"
      - "хвосты тоф"
    hints:
      - "Экспертные направления: скорость классификаторов, геометрия футеровки мельниц, дополнительная классификация целевого класса и более производительные классификаторы."

fallback:
  broad_keywords:
    - "хвост"
    - "хвостов"
    - "хвосты"
    - "обогащ"
    - "извлеч"
