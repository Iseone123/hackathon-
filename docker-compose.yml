services:
  api:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    volumes:
      - ./backend/data:/app/backend/data
  ui:
    build: .
    command: streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0
    ports: ["8501:8501"]
    environment:
      - API_URL=http://api:8000
    depends_on: [api]
